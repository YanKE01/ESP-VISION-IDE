server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # Hashed/static assets can be cached aggressively.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static multi-page site (index.html, bridge.html, ...): no SPA rewrite.
    location / {
        try_files $uri $uri/ =404;
    }
}
